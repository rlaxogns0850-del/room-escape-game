<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>표류자들 — 협동 방탈출</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #100D14;
    --panel: #17131D;
    --panel-edge: #241E2C;
    --ink: #D8CFE0;
    --ink-dim: #837A93;
    --arcane: #7FB0C9;
    --arcane-dim: #4C7488;
    --brass: #C9973B;
    --danger: #A24545;
    --success: #5C8A6A;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: 'EB Garamond', serif;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: radial-gradient(ellipse at 50% 0%, rgba(127,176,201,0.09), transparent 55%),
                radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.75), transparent 50%);
  }

  .wrap { max-width: 760px; margin: 0 auto; padding: 2.4rem 1.4rem 4rem; }

  h1.title {
    font-family: 'Cormorant Garamond', serif; font-weight: 700;
    font-size: 2.2rem; color: var(--arcane); margin: 0 0 0.3rem;
    letter-spacing: 0.02em;
  }
  .subtitle {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem;
    letter-spacing: 0.15em; color: var(--ink-dim); text-transform: uppercase;
    margin-bottom: 1.6rem;
  }

  .panel {
    background: var(--panel); border: 1px solid var(--panel-edge);
    padding: 1.6rem; margin-bottom: 1.2rem;
  }
  .panel h2 {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-dim);
    margin: 0 0 1rem;
  }

  p.intro-line { font-style: italic; color: #C6B9D6; line-height: 1.8; margin: 0 0 0.6rem; }

  label { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem;
    color: var(--ink-dim); letter-spacing: 0.08em; margin-bottom: 0.4rem; }
  input[type=text] {
    width: 100%; background: var(--bg); border: 1px solid var(--panel-edge);
    color: var(--ink); font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem;
    padding: 0.65rem 0.8rem; letter-spacing: 0.05em; margin-bottom: 1rem;
  }
  input[type=text]:focus-visible { outline: none; border-color: var(--arcane); }
  input[type=text]::placeholder { color: var(--ink-dim); }

  .btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; letter-spacing: 0.04em;
    background: var(--arcane-dim); color: #0D0F12; border: none;
    padding: 0.7rem 1.2rem; cursor: pointer; width: 100%;
  }
  .btn:hover { background: var(--arcane); }
  .btn.secondary { background: transparent; color: var(--ink); border: 1px solid var(--panel-edge); }
  .btn.secondary:hover { border-color: var(--arcane); color: var(--arcane); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; }
  .tabs button {
    flex: 1; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem;
    background: transparent; border: 1px solid var(--panel-edge); color: var(--ink-dim);
    padding: 0.6rem; cursor: pointer;
  }
  .tabs button.active { border-color: var(--arcane); color: var(--arcane); }

  .room-code-display {
    font-family: 'IBM Plex Mono', monospace; font-size: 1.8rem; letter-spacing: 0.3em;
    color: var(--brass); text-align: center; padding: 0.8rem 0; user-select: all;
  }
  .room-code-hint { text-align: center; font-size: 0.75rem; color: var(--ink-dim);
    font-family: 'IBM Plex Mono', monospace; margin-bottom: 0.8rem; }

  .player-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.6rem; }
  .player-chip {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--ink);
    border: 1px solid var(--arcane-dim); padding: 0.3rem 0.7rem;
  }
  .player-chip.me { color: var(--brass); border-color: var(--brass); }
  .player-chip.empty { color: var(--ink-dim); border-color: var(--panel-edge); }

  .stage-name { font-family: 'Cormorant Garamond', serif; font-weight: 700;
    font-size: 1.6rem; color: var(--ink); margin: 0 0 0.6rem; }
  .stage-flavor { line-height: 1.75; margin: 0 0 1.2rem; color: #C6B9D6; font-style: italic; }

  .my-clue {
    border-left: 3px solid var(--arcane); padding: 0.8rem 1rem;
    background: rgba(127,176,201,0.06); margin-bottom: 1.3rem;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; line-height: 1.7;
  }
  .my-clue .role-tag { color: var(--arcane); display: block; margin-bottom: 0.3rem;
    letter-spacing: 0.1em; font-size: 0.7rem; text-transform: uppercase; }

  .answer-row { display: flex; gap: 0.5rem; }
  .answer-row input { flex: 1; margin-bottom: 0; }
  .answer-row .btn { width: auto; padding: 0 1.2rem; }

  .log { max-height: 220px; overflow-y: auto; font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem; line-height: 1.7; }
  .log-line { margin: 0 0 0.3rem; color: var(--ink-dim); }
  .log-line.system { color: var(--ink); }
  .log-line.success { color: var(--success); }
  .log-line.error { color: var(--danger); }

  .ending {
    text-align: center; padding: 2rem 1rem;
  }
  .ending p { font-style: italic; color: #C6B9D6; line-height: 2; margin: 0.4rem 0; }

  .error-msg { color: var(--danger); font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem; margin: -0.6rem 0 1rem; min-height: 1em; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="wrap">
  <h1 class="title" id="story-title">표류자들</h1>
  <div class="subtitle">4인 협동 방탈출</div>

  <!-- ===== 화면 1: 시작 (방 만들기 / 참가) ===== -->
  <div id="screen-landing">
    <div class="panel">
      <h2>이야기</h2>
      <div id="intro-text"></div>
    </div>

    <div class="panel">
      <label for="player-name">당신의 이름</label>
      <input type="text" id="player-name" placeholder="탐사대원 이름" maxlength="12">

      <div class="tabs">
        <button type="button" id="tab-create" class="active">방 만들기</button>
        <button type="button" id="tab-join">코드로 참가</button>
      </div>

      <div id="join-code-row">
        <label for="room-code-input">방 코드</label>
        <input type="text" id="room-code-input" placeholder="예: 7XQK" maxlength="4" style="text-transform: uppercase;">
      </div>

      <div class="error-msg" id="landing-error"></div>
      <button class="btn" id="btn-enter">시작하기</button>
    </div>
  </div>

  <!-- ===== 화면 2: 게임 (로비 겸용 — 참가 즉시 스테이지 진행) ===== -->
  <div id="screen-game" class="hidden">
    <div class="panel">
      <h2>탐사대</h2>
      <div class="room-code-display" id="room-code-display">----</div>
      <div class="room-code-hint">이 코드를 친구에게 공유해서 함께 참가하세요 (최대 4명)</div>
      <div class="player-list" id="player-list"></div>
    </div>

    <div class="panel" id="stage-panel">
      <h2 id="stage-eyebrow">현재 구역</h2>
      <div class="stage-name" id="stage-name">—</div>
      <p class="stage-flavor" id="stage-flavor"></p>

      <div class="my-clue">
        <span class="role-tag">당신만 보이는 단서 (역할 <span id="my-role">-</span>)</span>
        <span id="my-clue-text">—</span>
      </div>

      <label for="answer-input" id="answer-hint">정답 입력</label>
      <div class="answer-row">
        <input type="text" id="answer-input" placeholder="다른 대원들과 상의해서 입력하세요" autocomplete="off">
        <button class="btn" id="btn-submit">확인</button>
      </div>
    </div>

    <div class="panel hidden" id="ending-panel">
      <div class="ending" id="ending-text"></div>
    </div>

    <div class="panel">
      <h2>기록</h2>
      <div class="log" id="log"></div>
    </div>
  </div>
</div>

<!-- Firebase compat SDK (multiplayer.js가 window.firebase를 사용) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script type="module">
import { firebaseConfig } from './js/firebase-config.js';
import {
  initFirebase, createRoom, joinRoom, listenToRoom, submitAnswer, getCurrentPlayerId
} from './js/multiplayer.js';
import { STORY_INTRO, STAGES, STAGE_ORDER, ENDING_TEXT } from './js/story-data.js';

const els = {
  introText: document.getElementById('intro-text'),
  storyTitle: document.getElementById('story-title'),
  playerName: document.getElementById('player-name'),
  tabCreate: document.getElementById('tab-create'),
  tabJoin: document.getElementById('tab-join'),
  joinCodeRow: document.getElementById('join-code-row'),
  roomCodeInput: document.getElementById('room-code-input'),
  landingError: document.getElementById('landing-error'),
  btnEnter: document.getElementById('btn-enter'),
  screenLanding: document.getElementById('screen-landing'),
  screenGame: document.getElementById('screen-game'),
  roomCodeDisplay: document.getElementById('room-code-display'),
  playerList: document.getElementById('player-list'),
  stagePanel: document.getElementById('stage-panel'),
  stageEyebrow: document.getElementById('stage-eyebrow'),
  stageName: document.getElementById('stage-name'),
  stageFlavor: document.getElementById('stage-flavor'),
  myRole: document.getElementById('my-role'),
  myClueText: document.getElementById('my-clue-text'),
  answerHint: document.getElementById('answer-hint'),
  answerInput: document.getElementById('answer-input'),
  btnSubmit: document.getElementById('btn-submit'),
  endingPanel: document.getElementById('ending-panel'),
  endingText: document.getElementById('ending-text'),
  log: document.getElementById('log'),
};

let mode = 'create';
let myRole = null;
let myName = '';
let currentRoomData = null;

els.storyTitle.textContent = STORY_INTRO.title;
els.introText.innerHTML = STORY_INTRO.text.map(t => `<p class="intro-line">${t}</p>`).join('');

els.tabCreate.addEventListener('click', () => setMode('create'));
els.tabJoin.addEventListener('click', () => setMode('join'));

function setMode(next) {
  mode = next;
  els.tabCreate.classList.toggle('active', mode === 'create');
  els.tabJoin.classList.toggle('active', mode === 'join');
  els.joinCodeRow.classList.toggle('hidden', mode !== 'join');
  els.btnEnter.textContent = mode === 'create' ? '방 만들기' : '참가하기';
}
setMode('create');

try {
  initFirebase(firebaseConfig);
} catch (err) {
  els.landingError.textContent = err.message;
  els.btnEnter.disabled = true;
}

els.btnEnter.addEventListener('click', async () => {
  const name = els.playerName.value.trim();
  if (!name) {
    els.landingError.textContent = '이름을 입력해주세요.';
    return;
  }
  els.landingError.textContent = '';
  els.btnEnter.disabled = true;

  try {
    let result;
    if (mode === 'create') {
      result = await createRoom(name);
    } else {
      const code = els.roomCodeInput.value.trim().toUpperCase();
      if (!code) throw new Error('방 코드를 입력해주세요.');
      result = await joinRoom(code, name);
    }
    myRole = result.role;
    myName = name;
    enterGame(result.code);
  } catch (err) {
    els.landingError.textContent = err.message;
  } finally {
    els.btnEnter.disabled = false;
  }
});

function enterGame(code) {
  els.screenLanding.classList.add('hidden');
  els.screenGame.classList.remove('hidden');
  els.roomCodeDisplay.textContent = code;
  listenToRoom(code, renderRoom);
}

function renderRoom(room) {
  if (!room) return;
  currentRoomData = room;
  renderPlayers(room.players || {});
  renderStage(room.stage);
  renderLog(room.log || {});
}

function renderPlayers(players) {
  const entries = Object.entries(players).sort((a, b) => a[1].role - b[1].role);
  const myId = getCurrentPlayerId();
  const slots = [1, 2, 3, 4].map(role => {
    const found = entries.find(([, p]) => p.role === role);
    if (!found) return `<span class="player-chip empty">역할 ${role}: 대기 중</span>`;
    const [id, p] = found;
    const mine = id === myId;
    return `<span class="player-chip ${mine ? 'me' : ''}">역할 ${role}: ${p.name}${mine ? ' (나)' : ''}</span>`;
  });
  els.playerList.innerHTML = slots.join('');
}

function renderStage(stageId) {
  if (stageId >= 4) {
    els.stagePanel.classList.add('hidden');
    els.endingPanel.classList.remove('hidden');
    els.endingText.innerHTML = ENDING_TEXT.map(t => `<p>${t}</p>`).join('');
    return;
  }
  els.stagePanel.classList.remove('hidden');
  els.endingPanel.classList.add('hidden');

  const stage = STAGES[stageId];
  if (!stage) return;

  els.stageEyebrow.textContent = `${STAGE_ORDER.indexOf(stageId) + 1} / ${STAGE_ORDER.length} 구역`;
  els.stageName.textContent = stage.title;
  els.stageFlavor.textContent = stage.flavor;
  els.myRole.textContent = myRole ?? '-';
  els.myClueText.textContent = myRole ? (stage.clues[myRole] ?? '단서 없음') : '단서 없음';
  els.answerHint.textContent = stage.inputHint || '정답 입력';
}

function renderLog(logObj) {
  const entries = Object.values(logObj).sort((a, b) => (a.ts || 0) - (b.ts || 0));
  els.log.innerHTML = entries
    .map(e => `<p class="log-line ${e.type || ''}">${escapeHtml(e.text)}</p>`)
    .join('') || '<p class="log-line">아직 기록이 없다.</p>';
  els.log.scrollTop = els.log.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function handleSubmit() {
  const value = els.answerInput.value.trim();
  if (!value || !currentRoomData) return;
  els.btnSubmit.disabled = true;
  try {
    await submitAnswer(els.roomCodeDisplay.textContent, currentRoomData.stage, value, myName);
    els.answerInput.value = '';
  } finally {
    els.btnSubmit.disabled = false;
  }
}

els.btnSubmit.addEventListener('click', handleSubmit);
els.answerInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleSubmit();
});
</script>
</body>
</html>
